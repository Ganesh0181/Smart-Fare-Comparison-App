services:
  backend:
    build:
      context: ./backend
    container_name: smart_fare_backend

    ports:
      - "5000:5000"

    environment:
      - PORT=5000
      - NODE_ENV=production

    env_file:
      - ./backend/.env

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5000').then(()=>process.exit(0)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

    networks:
      - smart_fare_network

  frontend:
    build:
      context: ./frontend
    container_name: smart_fare_frontend

    ports:
      - "3000:3000"

    environment:
      - PORT=3000
      - CHOKIDAR_USEPOLLING=true

    depends_on:
      backend:
        condition: service_healthy

    restart: unless-stopped

    networks:
      - smart_fare_network

networks:
  smart_fare_network:
    driver: bridge